<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SAILGP REFERENCE</title>

<style>
body{
  margin:0;
  background:#f4f4f4;
  font-family: Arial, Helvetica, sans-serif;
  color:#222;
}

header{
  background:#8b0000;
  color:white;
  padding:18px 24px;
}

header h1{
  margin:0;
  font-size:30px;
  letter-spacing:1px;
}

header p{
  margin:4px 0 0;
  font-size:13px;
  opacity:.9;
}

main{
  max-width:1500px;
  margin:24px auto;
  padding:0 16px 40px;
}

.section{
  background:white;
  border:1px solid #ccc;
  margin-bottom:28px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.section-title{
  background:#8b0000;
  color:white;
  font-weight:bold;
  font-size:18px;
  padding:10px 14px;
}

.image-wrap{
  padding:14px;
  overflow-x:auto;
}

.image-wrap img{
  width:100%;
  max-width:1400px;
  display:block;
  margin:auto;
}

footer{
  max-width:1500px;
  margin:0 auto 30px;
  padding:0 16px;
  color:#777;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <h1>SAILGP REFERENCE</h1>
  <p>Unofficial statistics reference for SailGP</p>
</header>

<main>

  <div class="section">
    <div class="section-title">Fleet Race Summary</div>
    <div class="image-wrap">
      <img src="fleet_summary.png" alt="Fleet Race Summary">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Fleet Race Finishes by Position</div>
    <div class="image-wrap">
      <img src="fleet_finishes.png" alt="Fleet Race Finishes by Position">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Fleet Race Last Win</div>
    <div class="image-wrap">
      <img src="fleet_race.png" alt="Fleet Race Last Win">
    </div>
  </div>

</main>

<footer>
  SAILGP REFERENCE is an unofficial statistics reference site.
</footer>

</body>
</html>
